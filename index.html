<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EGCinmuno — Laboratorio Virtual de Examen</title>
  <meta name="description" content="Plataforma de examen práctico de Especialización en Genética Clínica e Inmunología">
  <link rel="icon" type="image/png" href="images/logo_square.png">
  <link rel="stylesheet" href="css/styles.css">
  <script>
    (function () {
      const theme = localStorage.getItem("theme") || "dark";
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
</head>

<body>

  <button class="btn-theme-toggle" id="theme-toggle-btn" style="position:fixed; top:1.5rem; right:1.5rem; z-index:1000;"
    title="Cambiar tema">🌓</button>

  <main class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <span class="login-logo">🧬</span>
        <h1>EGC-Inmuno</h1>
        <p>Consulta y Laboratorio Virtual</p>
      </div>

      <form class="login-form" id="login-form">
        <div class="form-group">
          <label for="student-input">Nombre completo o email institucional</label>
          <input type="text" id="student-input" name="student-input" placeholder="Ej: Ana García o ana.garcia@uni.edu"
            autocomplete="name" autocorrect="off" spellcheck="false" required>
        </div>

        <button type="submit" class="btn-login" id="login-btn">
          Ingresar
        </button>

        <div class="login-error" id="login-error"></div>
      </form>

      <p class="login-hint">
        ¿Sos docente? <a href="admin.html">Acceder al panel de administración →</a>
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/cases.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Si ya hay sesión activa, redirigir
      if (getSession()) {
        window.location.href = "exam.html";
        return;
      }

      const form = document.getElementById("login-form");
      const errorEl = document.getElementById("login-error");

      form.addEventListener("submit", e => {
        e.preventDefault();
        const input = document.getElementById("student-input").value.trim();
        const btn = document.getElementById("login-btn");

        btn.disabled = true;
        btn.textContent = "Verificando...";

        setTimeout(async () => {
          const result = await loginStudent(input);
          if (result.success) {
            btn.textContent = "✓ Acceso concedido";
            setTimeout(() => window.location.href = "exam.html", 400);
          } else {
            errorEl.textContent = result.error;
            errorEl.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Ingresar al Laboratorio";
          }
        }, 600);
      });
    });
  </script>

</body>

</html>
